server:
  port: ${PORT:8080}

spring:
  application:
    name: AptisEsol

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aptis_esol?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:demo123}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.gmail.com
          starttls:
            enable: false
            required: false
          connectiontimeout: 20000
          timeout: 20000
          writetimeout: 20000

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-minutes: ${JWT_ACCESS_MINUTES:60}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}

  upload-dir: ${UPLOAD_DIR:uploads}
  cors: ${APP_CORS:http://localhost:5173}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  mail:
    enabled: ${MAIL_ENABLED:true}
    verification-token-hours: ${MAIL_VERIFY_HOURS:24}

  subscription:
    free-trial-days: ${FREE_TRIAL_DAYS:2}

  seed:
    admin-email: ${SEED_ADMIN_EMAIL:admin@aptis.com}
    admin-password: ${SEED_ADMIN_PASSWORD:}
    student-email: ${SEED_STUDENT_EMAIL:student@aptis.com}
    student-password: ${SEED_STUDENT_PASSWORD:}

  payment:
    bank-id: ${PAYMENT_BANK_ID:}
    account-no: ${PAYMENT_ACCOUNT_NO:}
    account-name: ${PAYMENT_ACCOUNT_NAME:}
    sepay-webhook-token: ${SEPAY_WEBHOOK_TOKEN:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.mail: DEBUG
    org.eclipse.angus.mail: DEBUG
